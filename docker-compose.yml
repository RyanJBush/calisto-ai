services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: calisto
      POSTGRES_USER: calisto
      POSTGRES_PASSWORD: calisto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://calisto:calisto@postgres:5432/calisto
      JWT_SECRET: change-me
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
